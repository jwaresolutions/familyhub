services:
  init:
    image: alpine:3.19
    restart: "no"
    volumes:
      - secrets:/secrets
    command: >
      sh -c '
        if [ ! -f /secrets/db_password ]; then
          head -c 32 /dev/urandom | base64 | tr -d "/+=" | head -c 32 > /secrets/db_password
          head -c 32 /dev/urandom | base64 | tr -d "/+=" | head -c 32 > /secrets/jwt_secret
          echo "Secrets generated."
        else
          echo "Secrets already exist, skipping."
        fi
      '

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: organize
      POSTGRES_USER: organize
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U organize"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - secrets:/secrets:ro
    environment:
      OBA_API_KEY: ${OBA_API_KEY:-TEST}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3001"

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - api
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}

volumes:
  pgdata:
  secrets:
